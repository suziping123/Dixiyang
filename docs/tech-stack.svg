<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="vueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42b883"/>
      <stop offset="100%" style="stop-color:#35495e"/>
    </linearGradient>
    <linearGradient id="pyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#306998"/>
      <stop offset="100%" style="stop-color:#ffd43b"/>
    </linearGradient>
    <linearGradient id="cudaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#5a8f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="620" fill="url(#bg)"/>
  
  <!-- 标题 -->
  <text x="500" y="40" text-anchor="middle" fill="white" font-size="26" font-weight="800" filter="url(#glow)">DIXIYANG</text>
  <text x="500" y="60" text-anchor="middle" fill="#666" font-size="11" letter-spacing="6">AI-POWERED RAG SYSTEM</text>

  <!-- ==================== 阶段1: GPU 离线向量化 ==================== -->
  <g transform="translate(40, 85)">
    <rect x="0" y="0" width="920" height="150" rx="14" fill="rgba(118,185,0,0.06)" stroke="rgba(118,185,0,0.3)" stroke-width="1.5"/>
    <text x="20" y="25" fill="#76b900" font-size="13" font-weight="700" letter-spacing="3">PHASE 1 · GPU 向量化 (离线)</text>

    <!-- NVIDIA Logo 简化 -->
    <g transform="translate(20, 45)">
      <rect width="70" height="70" rx="10" fill="rgba(118,185,0,0.15)" stroke="#76b900" stroke-width="1.5"/>
      <text x="35" y="30" text-anchor="middle" fill="#76b900" font-size="22" font-weight="900">N</text>
      <text x="35" y="50" text-anchor="middle" fill="#76b900" font-size="8" letter-spacing="1">VIDIA</text>
      <text x="35" y="65" text-anchor="middle" fill="#888" font-size="8">GPU</text>
    </g>

    <!-- 数据源 -->
    <g transform="translate(105, 50)">
      <rect width="100" height="55" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <text x="50" y="22" text-anchor="middle" fill="#aaa" font-size="11" font-weight="600">Data Sources</text>
      <text x="50" y="38" text-anchor="middle" fill="#666" font-size="9">PDF / CSV / MD</text>
      <text x="50" y="50" text-anchor="middle" fill="#666" font-size="8">processor.py</text>
    </g>

    <!-- 箭头 -->
    <g opacity="0.4">
      <line x1="215" y1="82" x2="240" y2="82" stroke="#76b900" stroke-width="1.5"/>
      <polygon points="240,78 248,82 240,86" fill="#76b900"/>
    </g>

    <!-- 切割 -->
    <g transform="translate(260, 50)">
      <rect width="100" height="55" rx="8" fill="rgba(255,107,107,0.08)" stroke="rgba(255,107,107,0.3)" stroke-width="1"/>
      <text x="50" y="22" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="600">Chunking</text>
      <text x="50" y="38" text-anchor="middle" fill="#888" font-size="8">RecursiveTextSplitter</text>
      <text x="50" y="50" text-anchor="middle" fill="#666" font-size="8">512 tokens</text>
    </g>

    <!-- 箭头 -->
    <g opacity="0.4">
      <line x1="370" y1="82" x2="395" y2="82" stroke="#ff6b6b" stroke-width="1.5"/>
      <polygon points="395,78 403,82 395,86" fill="#ff6b6b"/>
    </g>

    <!-- bge-m3 Embedding -->
    <g transform="translate(415, 45)">
      <rect width="130" height="65" rx="10" fill="rgba(255,212,59,0.1)" stroke="rgba(255,212,59,0.4)" stroke-width="1.5"/>
      <!-- bge-m3 简化 logo -->
      <circle cx="25" cy="32" r="14" fill="none" stroke="#ffd43b" stroke-width="1.5"/>
      <text x="25" y="36" text-anchor="middle" fill="#ffd43b" font-size="10" font-weight="700">bge</text>
      <text x="80" y="22" text-anchor="middle" fill="#ffd43b" font-size="13" font-weight="700">bge-m3</text>
      <text x="80" y="38" text-anchor="middle" fill="#888" font-size="8">Embedding</text>
      <text x="80" y="50" text-anchor="middle" fill="#666" font-size="8">1024 dim</text>
      <text x="80" y="60" text-anchor="middle" fill="#666" font-size="7">sentence-transformers</text>
    </g>

    <!-- 箭头 -->
    <g opacity="0.4">
      <line x1="555" y1="82" x2="580" y2="82" stroke="#ffd43b" stroke-width="1.5"/>
      <polygon points="580,78 588,82 580,86" fill="#ffd43b"/>
    </g>

    <!-- ChromaDB -->
    <g transform="translate(600, 45)">
      <rect width="140" height="65" rx="10" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.4)" stroke-width="1.5"/>
      <!-- Chroma 简化 logo -->
      <circle cx="25" cy="32" r="12" fill="none" stroke="#ff6b35" stroke-width="2"/>
      <circle cx="25" cy="32" r="4" fill="#ff6b35"/>
      <text x="90" y="22" text-anchor="middle" fill="#ff6b35" font-size="13" font-weight="700">ChromaDB</text>
      <text x="90" y="38" text-anchor="middle" fill="#888" font-size="8">Vector Store</text>
      <text x="90" y="50" text-anchor="middle" fill="#666" font-size="8">111,509 docs</text>
      <text x="90" y="60" text-anchor="middle" fill="#666" font-size="7">:8000</text>
    </g>

    <!-- 箭头到备份 -->
    <g opacity="0.4">
      <line x1="750" y1="82" x2="775" y2="82" stroke="#ff6b35" stroke-width="1.5"/>
      <polygon points="775,78 783,82 775,86" fill="#ff6b35"/>
    </g>

    <!-- JSONL 备份 -->
    <g transform="translate(795, 55)">
      <rect width="90" height="40" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="45" y="18" text-anchor="middle" fill="#666" font-size="9">Backup</text>
      <text x="45" y="32" text-anchor="middle" fill="#555" font-size="8">JSONL chunks</text>
    </g>
  </g>

  <!-- ==================== 阶段2: 在线服务 ==================== -->
  <g transform="translate(40, 255)">
    <rect x="0" y="0" width="920" height="200" rx="14" fill="rgba(66,184,131,0.04)" stroke="rgba(66,184,131,0.2)" stroke-width="1"/>
    <text x="20" y="25" fill="#42b883" font-size="13" font-weight="700" letter-spacing="3">PHASE 2 · ONLINE SERVICE</text>

    <!-- Vue3 前端 -->
    <g transform="translate(20, 45)">
      <rect width="180" height="135" rx="12" fill="rgba(66,184,131,0.08)" stroke="#42b883" stroke-width="1.5"/>
      <!-- Vue Logo -->
      <g transform="translate(70, 10)">
        <polygon points="30,0 60,50 0,50" fill="none" stroke="#42b883" stroke-width="2"/>
        <polygon points="30,12 48,42 12,42" fill="none" stroke="#35495e" stroke-width="1.5"/>
        <text x="30" y="38" text-anchor="middle" fill="#42b883" font-size="11" font-weight="800">V3</text>
      </g>
      <text x="90" y="75" text-anchor="middle" fill="#42b883" font-size="14" font-weight="700">Vue 3.5</text>
      
      <!-- 技术标签 -->
      <g transform="translate(12, 85)">
        <rect width="55" height="18" rx="4" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="0.8"/>
        <text x="27" y="13" text-anchor="middle" fill="#38bdf8" font-size="8">Tailwind</text>
      </g>
      <g transform="translate(73, 85)">
        <rect width="45" height="18" rx="4" fill="rgba(64,158,255,0.1)" stroke="#409eff" stroke-width="0.8"/>
        <text x="22" y="13" text-anchor="middle" fill="#409eff" font-size="8">Element</text>
      </g>
      <g transform="translate(124, 85)">
        <rect width="45" height="18" rx="4" fill="rgba(255,214,0,0.1)" stroke="#ffd600" stroke-width="0.8"/>
        <text x="22" y="13" text-anchor="middle" fill="#ffd600" font-size="8">Pinia</text>
      </g>
      
      <g transform="translate(12, 110)">
        <rect width="45" height="18" rx="4" fill="rgba(136,0,255,0.1)" stroke="#8800ff" stroke-width="0.8"/>
        <text x="22" y="13" text-anchor="middle" fill="#8800ff" font-size="8">GSAP</text>
      </g>
      <g transform="translate(63, 110)">
        <rect width="50" height="18" rx="4" fill="rgba(189,52,254,0.1)" stroke="#bd34fe" stroke-width="0.8"/>
        <text x="25" y="13" text-anchor="middle" fill="#bd34fe" font-size="8">Vite 7</text>
      </g>
      <g transform="translate(119, 110)">
        <rect width="48" height="18" rx="4" fill="rgba(49,120,198,0.1)" stroke="#3178c6" stroke-width="0.8"/>
        <text x="24" y="13" text-anchor="middle" fill="#3178c6" font-size="8">TS 5.9</text>
      </g>
    </g>

    <!-- 连接线 Vue → Python -->
    <g opacity="0.5">
      <path d="M 210 120 Q 250 120 270 120" stroke="#42b883" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
      <polygon points="270,116 278,120 270,124" fill="#42b883"/>
      <text x="240" y="112" text-anchor="middle" fill="#42b883" font-size="8">HTTP</text>
      <text x="240" y="122" text-anchor="middle" fill="#42b883" font-size="7">:8084</text>
    </g>

    <!-- Python FastAPI 后端 -->
    <g transform="translate(290, 45)">
      <rect width="280" height="135" rx="12" fill="rgba(55,118,171,0.08)" stroke="#3776ab" stroke-width="1.5"/>
      <!-- Python Logo 简化 -->
      <g transform="translate(115, 5)">
        <rect width="50" height="50" rx="8" fill="rgba(48,105,152,0.2)" stroke="#306998" stroke-width="1.5"/>
        <text x="25" y="22" text-anchor="middle" fill="#306998" font-size="16" font-weight="900">Py</text>
        <text x="25" y="40" text-anchor="middle" fill="#ffd43b" font-size="16" font-weight="900">thon</text>
      </g>
      <text x="140" y="68" text-anchor="middle" fill="#3776ab" font-size="14" font-weight="700">FastAPI</text>

      <!-- RAG Pipeline 内部 -->
      <g transform="translate(15, 80)">
        <rect width="250" height="45" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <text x="125" y="15" text-anchor="middle" fill="#888" font-size="9" font-weight="600">RAG Pipeline</text>
        
        <!-- Query → Embed → Retrieve → Rerank → LLM -->
        <g transform="translate(8, 22)">
          <rect width="38" height="18" rx="3" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="0.8"/>
          <text x="19" y="13" text-anchor="middle" fill="#06b6d4" font-size="7">Query</text>
        </g>
        <g opacity="0.4"><line x1="50" y1="31" x2="58" y2="31" stroke="#06b6d4" stroke-width="0.8"/><polygon points="58,29 62,31 58,33" fill="#06b6d4"/></g>
        <g transform="translate(65, 22)">
          <rect width="35" height="18" rx="3" fill="rgba(255,212,59,0.15)" stroke="#ffd43b" stroke-width="0.8"/>
          <text x="17" y="13" text-anchor="middle" fill="#ffd43b" font-size="7">Embed</text>
        </g>
        <g opacity="0.4"><line x1="104" y1="31" x2="112" y2="31" stroke="#ffd43b" stroke-width="0.8"/><polygon points="112,29 116,31 112,33" fill="#ffd43b"/></g>
        <g transform="translate(119, 22)">
          <rect width="42" height="18" rx="3" fill="rgba(255,107,53,0.15)" stroke="#ff6b35" stroke-width="0.8"/>
          <text x="21" y="13" text-anchor="middle" fill="#ff6b35" font-size="7">Retrieve</text>
        </g>
        <g opacity="0.4"><line x1="165" y1="31" x2="173" y2="31" stroke="#ff6b35" stroke-width="0.8"/><polygon points="173,29 177,31 173,33" fill="#ff6b35"/></g>
        <g transform="translate(180, 22)">
          <rect width="40" height="18" rx="3" fill="rgba(168,85,247,0.15)" stroke="#a855f7" stroke-width="0.8"/>
          <text x="20" y="13" text-anchor="middle" fill="#a855f7" font-size="7">Rerank</text>
        </g>
        <g opacity="0.4"><line x1="224" y1="31" x2="230" y2="31" stroke="#a855f7" stroke-width="0.8"/></g>
      </g>

      <!-- 底部组件 -->
      <g transform="translate(15, 108)">
        <rect width="60" height="20" rx="4" fill="rgba(255,107,107,0.1)" stroke="rgba(255,107,107,0.3)" stroke-width="0.8"/>
        <text x="30" y="14" text-anchor="middle" fill="#ff6b6b" font-size="8">DeepSeek</text>
      </g>
      <g transform="translate(82, 108)">
        <rect width="55" height="20" rx="4" fill="rgba(212,175,55,0.1)" stroke="rgba(212,175,55,0.3)" stroke-width="0.8"/>
        <text x="27" y="14" text-anchor="middle" fill="#d4af37" font-size="8">JWT Auth</text>
      </g>
      <g transform="translate(144, 108)">
        <rect width="60" height="20" rx="4" fill="rgba(0,150,136,0.1)" stroke="rgba(0,150,136,0.3)" stroke-width="0.8"/>
        <text x="30" y="14" text-anchor="middle" fill="#009688" font-size="8">SQLAlchemy</text>
      </g>
    </g>

    <!-- 连接线 Python → ChromaDB -->
    <g opacity="0.5">
      <path d="M 580 120 L 630 120" stroke="#ff6b35" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
      <polygon points="630,116 638,120 630,124" fill="#ff6b35"/>
      <text x="608" y="110" text-anchor="middle" fill="#ff6b35" font-size="7">Query</text>
    </g>

    <!-- ChromaDB (运行时) -->
    <g transform="translate(650, 55)">
      <rect width="120" height="85" rx="10" fill="rgba(255,107,53,0.1)" stroke="#ff6b35" stroke-width="1.5"/>
      <circle cx="60" cy="25" r="16" fill="none" stroke="#ff6b35" stroke-width="2"/>
      <circle cx="60" cy="25" r="5" fill="#ff6b35"/>
      <text x="60" y="55" text-anchor="middle" fill="#ff6b35" font-size="11" font-weight="700">ChromaDB</text>
      <text x="60" y="68" text-anchor="middle" fill="#888" font-size="8">Runtime</text>
      <text x="60" y="78" text-anchor="middle" fill="#666" font-size="7">:8000</text>
    </g>

    <!-- 连接 ChromaDB → Reranker -->
    <g opacity="0.5">
      <path d="M 710 145 Q 710 170 680 170 L 630 170" stroke="#a855f7" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
      <polygon points="630,166 622,170 630,174" fill="#a855f7"/>
    </g>

    <!-- bge-reranker -->
    <g transform="translate(790, 55)">
      <rect width="110" height="85" rx="10" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.3)" stroke-width="1.5"/>
      <!-- 简化 reranker 图标 -->
      <g transform="translate(35, 8)">
        <rect width="40" height="40" rx="6" fill="rgba(168,85,247,0.15)" stroke="#a855f7" stroke-width="1"/>
        <text x="20" y="18" text-anchor="middle" fill="#a855f7" font-size="8" font-weight="700">bge</text>
        <text x="20" y="32" text-anchor="middle" fill="#a855f7" font-size="7">rerank</text>
      </g>
      <text x="55" y="60" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="700">Reranker</text>
      <text x="55" y="73" text-anchor="middle" fill="#888" font-size="8">bge-reranker-base</text>
      <text x="55" y="83" text-anchor="middle" fill="#666" font-size="7">FlagEmbedding</text>
    </g>

    <!-- SSE 返回前端 -->
    <g opacity="0.4">
      <path d="M 290 165 Q 250 185 210 185 Q 180 185 160 165" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
      <text x="220" y="195" text-anchor="middle" fill="#06b6d4" font-size="7">SSE Stream</text>
    </g>
  </g>

  <!-- ==================== 底部: 端口 & 数据流 ==================== -->
  <g transform="translate(40, 475)">
    <rect x="0" y="0" width="920" height="80" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="22" fill="#555" font-size="11" font-weight="600" letter-spacing="2">PORT ALLOCATION</text>
    
    <!-- 端口标签 -->
    <g transform="translate(20, 35)">
      <rect width="130" height="30" rx="6" fill="rgba(66,184,131,0.08)" stroke="rgba(66,184,131,0.2)" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#42b883" font-size="9">Vue Dev :5173</text>
    </g>
    <g transform="translate(165, 35)">
      <rect width="130" height="30" rx="6" fill="rgba(55,118,171,0.08)" stroke="rgba(55,118,171,0.2)" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#3776ab" font-size="9">FastAPI :8084</text>
    </g>
    <g transform="translate(310, 35)">
      <rect width="130" height="30" rx="6" fill="rgba(255,107,53,0.08)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#ff6b35" font-size="9">ChromaDB :8000</text>
    </g>
    <g transform="translate(455, 35)">
      <rect width="130" height="30" rx="6" fill="rgba(0,117,143,0.08)" stroke="rgba(0,117,143,0.2)" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#00758f" font-size="9">MySQL :3306</text>
    </g>
    <g transform="translate(600, 35)">
      <rect width="130" height="30" rx="6" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#a855f7" font-size="9">Reranker :8085</text>
    </g>
  </g>

  <!-- 版本信息 -->
  <text x="500" y="590" text-anchor="middle" fill="#333" font-size="10">
    Vue 3.5 + FastAPI + ChromaDB + bge-m3 + bge-reranker + DeepSeek LLM
  </text>
</svg>
