# R5 5600U 配置（集显/纯CPU模式）
# 适用：无独立显卡，依赖系统内存，16-32GB RAM

device: "cpu"
precision: "fp32"

# Embedding 模型配置
embedding:
  model_name: "BAAI/bge-m3"
  batch_size: 32
  normalize_embeddings: true
  max_length: 512
  # CPU 优化
  encode_kwargs:
    device: "cpu"
    show_progress_bar: true
    convert_to_numpy: true
    half_precision: false

# 文本切分配置
text_splitter:
  chunk_size: 600
  chunk_overlap: 120
  separators: ["\n\n", "\n", "。", "！", "？", "；", "，", " ", ""]
  keep_separator: true

# 向量数据库配置
# 与 RTX 4060 共用 vectordb_4060 目录（同模型 bge-m3）
# Windows 构建后把 vectordb_4060 拷到 Linux 同位置即可直接用
vectordb:
  persist_directory: "./storage/vectordb_4060"
  collection_name: "dixiyang_knowledge"
  distance_metric: "cosine"
  chroma_settings:
    anonymized_telemetry: false
    allow_reset: true

# 检索配置
retrieval:
  top_k: 5
  score_threshold: 0.6
  use_reranker: false
  reranker_model: "BAAI/bge-reranker-base"
  reranker_batch_size: 8
  rerank_top_k: 10

# 处理流程配置
processing:
  # 并行处理（R5 5600U 6核12线程，留1-2核给系统）
  num_workers: 10
  # 批量写入向量库（大批次减少IO）
  batch_size: 256
  # 进度保存间隔
  checkpoint_interval: 500
  # 是否增量更新
  incremental: true
  # 预加载模型
  preload_models: true

# 模型缓存目录
cache_dir: "./models/cache"

# 日志
logging:
  level: "WARNING"
  file: "./logs/rag_r5.log"