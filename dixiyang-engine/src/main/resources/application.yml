spring:
  application:
    name: dixiyang-engine

  # 数据库连接
  sql:
    init:
      mode: never
  # 1. 数据库连接
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/dixiyang?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123321}

  # 2. 文件上传配置 (正确路径是在 spring.servlet.multipart) （对应 file 表需求）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 3. 邮件配置 (QQ SMTP)
  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME:3268845120@qq.com}
    password: ${MAIL_PASSWORD:yzhnzbwkaluncieh}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000

  # Jackson 配置
  jackson:
    deserialization:
      accept-float-as-int: true

  # 3. Spring AI 混合配置
  ai:
    # Ollama 本地模型 - 暂时禁用
    ollama:
      enabled: false
      base-url: http://localhost:11434
      embedding:
        options:
          model: nomic-embed-text
      chat:
        enabled: false
    # DeepSeek 云端模型 - 用于聊天
    openai:
      api-key: ${DEEPSEEK_API_KEY:${DS_API_KEY:}}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 2000
      
    # Qdrant 向量数据库 - 暂时禁用（需要 Ollama 提供 embedding）
    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        collection-name: inspiration_vectors
        # 第一次运行建议设为 true，它会自动帮你创建 collection
        initialize-schema: true
        # 如果你的 Qdrant 没设置 API Key，这里可以省略或留空
        api-key: ${QDRANT_API_KEY:}
        # 是否开启安全性校验（本地 Docker 默认不开启）
        use-tls: false
        enable: false
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:  # 无密码留空即可
#      database: 0
#      timeout: 10s  # 推荐用这种简洁写法（10s = 10000ms）
#      # Spring Boot 3.x 中 lettuce 连接池配置的正确写法
#      lettuce:
#        pool:
#          max-active: 8        # 最大活跃连接数（保留）
#          max-idle: 8          # 最大空闲连接数（保留）
#          min-idle: 0          # 最小空闲连接数（保留）
#          max-wait: PT0S       # 替换 -1ms，含义是“无等待超时（一直等）”，符合 3.x 规范
#        shutdown-timeout: 100ms  # 新增：连接池关闭超时时间（推荐加
#
# 4. 服务端口配置 (必须和 spring 平级)
server:
  port: 8084
  servlet:
    context-path: /api # 这样所有接口都会带上 /api 前缀，符合前后端分离规范
    # 文件上传配置其实是属于 spring.servlet.multipart 的
    # 注意：Spring Boot 3 中 multipart 配置路径如下

# 5. 聊天内容文件存储
app:
  chat:
    storage-path: ${CHAT_STORAGE_PATH:/home/lijiajia/项目/Dixiyang/uploads/storage/chat}
    max-file-size: ${CHAT_MAX_FILE_SIZE:102400}
  # 6. ChromaDB 向量数据库配置（用于 RAG 检索）
  chromadb:
    host: ${CHROMADB_HOST:[::1]}
    port: ${CHROMADB_PORT:8000}
    collection-name: dixiyang_knowledge

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.dixiyang.server.Entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    com.dixiyang: debug
    # 压制 SSE 断开连接的 ERROR 日志（正常客户端断开）
    org.apache.catalina: warn
    org.apache.coyote: warn

  file:
    name: logs/app.log
